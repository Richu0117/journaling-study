document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ay: flex; align-items: center; justify-content: center; padding: 28px 12px; position: absolute; left: 473px; top: 5px\">\n  <div style=\"position:relative;width:392px;height:812px;background:#2E2620;border-radius:52px;padding:11px;box-shadow:0 40px 90px -30px rgba(46,38,32,.6);\">\n    <div style=\"position:relative;width:100%;height:100%;border-radius:43px;overflow:hidden;background:{{ bg }};background-image:{{ bgImage }};background-size:22px 22px;display:flex;flex-direction:column;\">\n\n      <div style=\"position:absolute;top:0;left:0;right:0;height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:14px;font-weight:800;z-index:40;color:#2E2620;\">\n        <span>9:41<\/span><span style=\"letter-spacing:2px;\">\u2022\u2022\u2022 \uffee<\/span>\n      <\/div>\n\n      <div style=\"flex:1;overflow-y:auto;overflow-x:hidden;\">\n\n        <!-- SETUP \/ ID LOGIN -->\n        <sc-if value=\"{{ isSetup }}\">\n        <div class=\"aj-rise\" style=\"min-height:812px;display:flex;flex-direction:column;justify-content:center;padding:56px 30px 40px;\">\n          <div style=\"align-self:flex-start;transform:rotate(-4deg);margin-bottom:16px;\">{{ faceSetup }}<\/div>\n          <h1 style=\"font-family:'Caveat',cursive;font-weight:700;font-size:44px;line-height:.98;margin:0 0 8px;\">Adaptive<br>Journaling<\/h1>\n          <p style=\"color:#6E6455;font-size:15.5px;line-height:1.5;margin:0 0 22px;font-weight:600;\">Enter the participant ID your researcher gave you. It links your entries so your data can be saved.<\/p>\n          <label style=\"font-weight:800;font-size:14px;display:block;margin-bottom:8px;\">Participant ID<\/label>\n          <input class=\"aj-in\" value=\"{{ setupId }}\" oninput=\"{{ onSetupId }}\" placeholder=\"e.g. P01\" style=\"width:100%;border:2.5px solid #2E2620;border-radius:16px;padding:15px;font-size:17px;font-weight:700;background:#FFFCF5;box-shadow:3px 3px 0 #EAD6A9;\">\n          <p style=\"color:#d9634a;font-size:13px;font-weight:700;min-height:18px;margin:8px 2px 0;\">{{ setupError }}<\/p>\n          <div style=\"background:#FFF4D6;border:2px solid #E4B94B;border-radius:14px;padding:12px 14px;margin-top:6px;\"><p style=\"margin: 0; font-size: 13.5px; line-height: 1.5; color: #7a5c12; font-weight: 700\">Please don't change this ID later \u2014 your saved entries are matched to it, and changing it means data goes missing.<\/p><\/div><button onclick=\"{{ saveSetup }}\" style=\"margin-top:16px;width:100%;background:#F27A5B;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:15px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #2E2620;\">Save &amp; start<\/button>\n          \n          \n        <\/div>\n        <\/sc-if>\n\n        <!-- INTRO -->\n        <sc-if value=\"{{ isIntro }}\">\n        <div style=\"min-height:812px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 34px;text-align:center;position:relative;\">\n          <svg viewBox=\"0 0 24 24\" width=\"30\" style=\"position:absolute;top:120px;left:44px;color:#F2B33D;animation:aj-pop .5s .3s both;\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2l2.4 6.5L21 9l-5 4.2L17.5 21 12 16.8 6.5 21 8 13.2 3 9l6.6-.5z\"><\/path><\/svg>\n          <svg viewBox=\"0 0 24 24\" width=\"22\" style=\"position:absolute;top:200px;right:50px;color:#8FB98A;animation:aj-pop .5s .6s both;\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2l2.4 6.5L21 9l-5 4.2L17.5 21 12 16.8 6.5 21 8 13.2 3 9l6.6-.5z\"><\/path><\/svg>\n          <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:250px;height:250px;border-radius:50%;background:{{ introBlob }};transition:background .5s;opacity:.5;\"><\/div>\n          <div style=\"position:relative;animation:aj-bob 3s ease-in-out infinite;margin-bottom:24px;\">{{ introFaceEl }}<\/div>\n          <h1 class=\"aj-rise\" style=\"position:relative;font-family:'Caveat',cursive;font-weight:700;font-size:38px;line-height:1.05;margin:0 0 6px;\">This journal changes<br>with how you feel.<\/h1>\n          <svg viewBox=\"0 0 200 12\" width=\"200\" height=\"12\" style=\"margin:2px 0 16px;\" fill=\"none\" stroke=\"#F27A5B\" stroke-width=\"4\" stroke-linecap=\"round\"><path d=\"M4 7 Q50 1 100 6 T196 5\" stroke-dasharray=\"220\" stroke-dashoffset=\"220\" style=\"animation:aj-draw 1s .8s ease forwards;\"><\/path><\/svg>\n          <p class=\"aj-rise\" style=\"position:relative;color:#6E6455;font-size:16px;line-height:1.55;margin:0;font-weight:600;max-width:290px;animation-delay:.4s;\">Some days it asks for a single line. Other days, room to think it all through.<\/p>\n          <div style=\"position:relative;margin-top:36px;min-height:58px;\"><sc-if value=\"{{ introReady }}\"><button class=\"aj-pop\" onclick=\"{{ finishIntro }}\" style=\"background:#F27A5B;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:15px 42px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #2E2620;\">Let's begin<\/button><\/sc-if><\/div>\n          <button onclick=\"{{ finishIntro }}\" style=\"position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:none;border:none;color:#9a8f79;font-size:14px;font-weight:700;cursor:pointer;\">Skip<\/button>\n        <\/div>\n        <\/sc-if>\n\n        <!-- MOOD INTRO -->\n        <sc-if value=\"{{ isMoodIntro }}\">\n        <div class=\"aj-rise\" style=\"min-height:812px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 34px;text-align:center;\">\n          <button onclick=\"{{ goMoodPick }}\" style=\"background:none;border:none;cursor:pointer;animation:aj-bob 3.4s ease-in-out infinite;margin:20px 0 28px;\">{{ moodIntroFaceEl }}<\/button>\n          <h1 style=\"font-family:'Caveat',cursive;font-weight:700;font-size:42px;line-height:1;margin:0 0 8px;\">How are you today?<\/h1>\n          <p style=\"color:#6E6455;font-size:16px;line-height:1.5;margin:0 0 34px;font-weight:600;max-width:280px;\">Take a small moment to check in with yourself.<\/p>\n          <button onclick=\"{{ goMoodPick }}\" style=\"background:#F27A5B;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:15px 44px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #2E2620;\">Check in<\/button>\n        <\/div>\n        <\/sc-if>\n\n        <!-- MOOD PICK -->\n        <sc-if value=\"{{ isMoodPick }}\">\n        <div class=\"aj-slide\" style=\"min-height:812px;display:flex;flex-direction:column;padding:66px 22px 30px;\">\n          <button onclick=\"{{ goMoodIntro }}\" style=\"align-self:flex-start;display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:#9a8f79;font-size:14px;font-weight:800;margin-bottom:6px;\">{{ backIcon }} Back<\/button>\n          <h1 style=\"font-family:'Caveat',cursive;font-weight:700;font-size:36px;line-height:1;margin:0 0 2px;\">How are you, really?<\/h1>\n          <p style=\"color:#6E6455;font-size:14px;margin:0 0 18px;font-weight:600;\">Tap a mood \u2014 or create your own.<\/p>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px 6px;\">\n            <sc-for list=\"{{ moods }}\" as=\"m\" hint-placeholder-count=\"10\">\n              <button onclick=\"{{ m.onSelect }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;padding:4px 2px;\">\n                {{ m.faceEl }}\n                <span style=\"font-family:'Caveat',cursive;font-size:20px;font-weight:700;line-height:1;\">{{ m.name }}<\/span>\n              <\/button>\n            <\/sc-for>\n            <sc-for list=\"{{ customList }}\" as=\"cf\" hint-placeholder-count=\"0\">\n              <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 2px;\">\n                <button onclick=\"{{ cf.onSelect }}\" style=\"background:none;border:none;cursor:pointer;padding:0;\">{{ cf.tile }}<\/button>\n                <span style=\"font-family:'Caveat',cursive;font-size:20px;font-weight:700;line-height:1;\">{{ cf.name }}<\/span>\n                <button onclick=\"{{ cf.onDelete }}\" title=\"Delete face\" style=\"position:absolute;top:0;right:6px;width:24px;height:24px;border-radius:50%;background:#FFDAD2;border:2px solid #2E2620;cursor:pointer;font-size:14px;font-weight:800;color:#a33;line-height:1;display:flex;align-items:center;justify-content:center;\">\u00d7<\/button>\n              <\/div>\n            <\/sc-for>\n            <button onclick=\"{{ goCustomFace }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;padding:4px 2px;\">\n              <div style=\"width:72px;height:72px;border-radius:50%;background:#FBF3E1;border:2.5px dashed #2E2620;display:flex;align-items:center;justify-content:center;color:#2E2620;\">{{ plusIcon }}<\/div>\n              <span style=\"font-family:'Caveat',cursive;font-size:20px;font-weight:700;line-height:1;\">Create<\/span>\n            <\/button>\n          <\/div>\n        <\/div>\n        <\/sc-if>\n\n        <!-- CUSTOM FACE -->\n        <sc-if value=\"{{ isCustomFace }}\">\n        <div class=\"aj-slide\" style=\"min-height:812px;display:flex;flex-direction:column;padding:60px 22px 26px;\">\n          <button onclick=\"{{ goMoodPick }}\" style=\"align-self:flex-start;display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:#9a8f79;font-size:14px;font-weight:800;margin-bottom:8px;\">{{ backIcon }} Back<\/button>\n          <h1 style=\"font-family:'Caveat',cursive;font-weight:700;font-size:34px;line-height:1;margin:0 0 2px;\">Draw your own face<\/h1>\n          <p style=\"color:#6E6455;font-size:13px;margin:0 0 12px;font-weight:600;\">Doodle a little character, give it a name, and it joins your moods.<\/p>\n          <canvas ref=\"{{ customCanvasRef }}\" width=\"300\" height=\"300\" style=\"width:100%;aspect-ratio:1;border:2.5px solid #2E2620;border-radius:20px;background:{{ customBg }};touch-action:none;display:block;box-shadow:4px 4px 0 #E9D4A6;\"><\/canvas>\n          <div style=\"display:flex;align-items:center;gap:5px;margin-top:12px;flex-wrap:nowrap;justify-content:center;\">\n            <span style=\"font-size:11px;font-weight:800;color:#9a8f79;margin-right:1px;\">Pen<\/span>\n            <sc-for list=\"{{ swatches }}\" as=\"w\" hint-placeholder-count=\"6\"><button onclick=\"{{ w.onClick }}\" style=\"{{ w.style }}\"><\/button><\/sc-for>\n            <button onclick=\"{{ toggleEraser }}\" style=\"{{ eraserStyle }}\">{{ eraseIcon }}<\/button>\n            <button onclick=\"{{ undoCust }}\" title=\"Undo\" style=\"width:28px;height:28px;border:2px solid #2E2620;border-radius:8px;background:#FBF3E1;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;\">{{ undoIcon }}<\/button>\n            <button onclick=\"{{ clearCust }}\" title=\"Clear all\" style=\"width:28px;height:28px;border:2px solid #2E2620;border-radius:8px;background:#FBF3E1;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#a33;flex-shrink:0;\">{{ trashIcon2 }}<\/button>\n          <\/div>\n          <div style=\"display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;\">\n            <span style=\"font-size:11px;font-weight:800;color:#9a8f79;margin-right:2px;\">Paper<\/span>\n            <sc-for list=\"{{ bgSwatches }}\" as=\"w\" hint-placeholder-count=\"6\"><button onclick=\"{{ w.onClick }}\" style=\"{{ w.style }}\"><\/button><\/sc-for>\n          <\/div>\n          <input class=\"aj-in\" value=\"{{ customName }}\" oninput=\"{{ onCustomName }}\" placeholder=\"Name this face\u2026\" style=\"margin-top:12px;width:100%;border:2.5px solid #2E2620;border-radius:14px;padding:12px;font-size:16px;font-weight:700;background:#FFFCF5;\">\n          <button onclick=\"{{ saveCustom }}\" style=\"margin-top:auto;width:100%;background:#5f7d58;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:15px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #2E2620;\">Save this face<\/button>\n        <\/div>\n        <\/sc-if>\n\n        <!-- DETAILS -->\n        <sc-if value=\"{{ isDetails }}\">\n        <div class=\"aj-slide\" style=\"min-height:812px;display:flex;flex-direction:column;padding:66px 22px 30px;\">\n          <button onclick=\"{{ goMoodPick }}\" style=\"align-self:flex-start;display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:#9a8f79;font-size:14px;font-weight:800;margin-bottom:10px;\">{{ backIcon }} Change mood<\/button>\n          <div style=\"display:flex;flex-direction:column;align-items:center;margin-bottom:18px;\">\n            <sc-if value=\"{{ chosenIsCustom }}\">{{ chosenTile }}<\/sc-if>\n            <sc-if value=\"{{ chosenIsStd }}\">{{ chosenFaceEl }}<\/sc-if>\n            <p style=\"font-family:'Caveat',cursive;font-weight:700;font-size:30px;margin:8px 0 0;line-height:1;\">{{ chosenName }}<\/p>\n          <\/div>\n          <div style=\"background:#FFFCF5;border:2.5px solid #2E2620;border-radius:22px;padding:18px;box-shadow:4px 4px 0 #E9D4A6;\">\n            <p style=\"font-family:'Caveat',cursive;font-weight:700;font-size:24px;margin:0 0 2px;\">A few quick dials<\/p>\n            <sc-for list=\"{{ dials }}\" as=\"d\" hint-placeholder-count=\"4\"><div style=\"margin-top:13px;\"><div style=\"display:flex;justify-content:space-between;align-items:baseline;\"><span style=\"font-size:13.5px;font-weight:700;\">{{ d.label }}<\/span><span style=\"font-size:14px;color:#F27A5B;font-weight:800;\">{{ d.valLabel }}<\/span><\/div><input type=\"range\" class=\"aj-range\" min=\"1\" max=\"5\" value=\"{{ d.value }}\" oninput=\"{{ d.onInput }}\" style=\"width:100%;margin-top:7px;\"><\/div><\/sc-for>\n          <\/div>\n          <div style=\"background:#FFFCF5;border:2.5px solid #2E2620;border-radius:22px;padding:16px 18px;margin-top:12px;box-shadow:4px 4px 0 #E9D4A6;\">\n            <p style=\"font-family:'Caveat',cursive;font-weight:700;font-size:24px;margin:0 0 10px;\">One event on your mind?<\/p>\n            <div style=\"display:flex;gap:10px;\"><button onclick=\"{{ setEventNo }}\" style=\"{{ eventNoStyle }}\">Not today<\/button><button onclick=\"{{ setEventYes }}\" style=\"{{ eventYesStyle }}\">Yes, one thing<\/button><\/div>\n            <sc-if value=\"{{ eventYes }}\"><div style=\"margin-top:12px;\"><sc-raw-select class=\"aj-sel\" value=\"{{ eventKeyword }}\" onchange=\"{{ onKeyword }}\" style=\"width:100%;border:2.5px solid #2E2620;border-radius:14px;padding:12px;font-size:15px;font-weight:700;background:#FFFCF5;\"><sc-for list=\"{{ keywords }}\" as=\"k\" hint-placeholder-count=\"6\"><option value=\"{{ k }}\">{{ k }}<\/option><\/sc-for><\/sc-raw-select><\/div><\/sc-if>\n          <\/div>\n          <button onclick=\"{{ submitCheckin }}\" style=\"margin-top:auto;width:100%;background:#2E2620;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #F2B33D;\">Continue<\/button>\n        <\/div>\n        <\/sc-if>\n\n        <!-- BREATHING -->\n        <sc-if value=\"{{ isBreathing }}\">\n        <div style=\"min-height:812px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 34px;text-align:center;\">\n          <div style=\"position:relative;width:250px;height:250px;display:flex;align-items:center;justify-content:center;margin-bottom:34px;\">\n            <div style=\"position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,#a9c7a6,transparent 70%);animation:aj-halo 8s ease-in-out infinite;\"><\/div>\n            <div style=\"width:172px;height:172px;border-radius:50%;background:radial-gradient(circle at 40% 34%,#a6cf9f,#7ba274);box-shadow:0 24px 50px -14px rgba(95,125,88,.6);animation:aj-medbreathe 8s ease-in-out infinite;display:flex;align-items:center;justify-content:center;\">{{ faceBreathe }}<\/div>\n          <\/div>\n          <p style=\"font-family:'Caveat',cursive;font-size:34px;line-height:1;margin:0 0 8px;color:#3f5738;\">{{ breathPhase }}<\/p>\n          <p class=\"aj-rise\" style=\"color:#5c6a54;font-size:15px;margin:0;font-weight:600;max-width:280px;\">This time is safe, and it's yours. There's no need to rush.<\/p>\n          <div style=\"margin-top:40px;min-height:56px;\"><sc-if value=\"{{ breatheReady }}\"><button class=\"aj-pop\" onclick=\"{{ afterBreathe }}\" style=\"background:#5f7d58;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:14px 40px;font-size:17px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #2E2620;\">I'm ready<\/button><\/sc-if><\/div>\n        <\/div>\n        <\/sc-if>\n\n        <!-- JOURNAL MODE -->\n        <sc-if value=\"{{ isJmode }}\">\n        <div class=\"aj-slide\" style=\"min-height:812px;display:flex;flex-direction:column;padding:66px 22px 30px;\">\n          <button onclick=\"{{ backToDetails }}\" style=\"align-self:flex-start;display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:#9a8f79;font-size:14px;font-weight:800;\">{{ backIcon }} Back<\/button>\n          <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;\">\n            <div style=\"{{ suggestStyle }}\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;\">\n                <div style=\"margin-bottom:12px;\">{{ suggestFaceEl }}<\/div>\n                <p style=\"font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;opacity:.6;margin:0 0 4px;\">{{ suggestKicker }}<\/p>\n                <p style=\"font-family:'Caveat',cursive;font-size:30px;line-height:1.05;margin:0;font-weight:700;\">{{ suggestText }}<\/p>\n                <sc-if value=\"{{ burnout }}\"><p style=\"font-size:13.5px;line-height:1.55;margin:12px 0 0;opacity:.95;font-weight:600;\">{{ burnoutNote }}<\/p><\/sc-if>\n              <\/div>\n            <\/div>\n            <p style=\"text-align: center; font-size: 13.5px; color: #6E6455; font-weight: 700; margin: 26px 0 10px\">Or choose a different depth<\/p>\n            <div style=\"display:flex;gap:8px;\"><sc-for list=\"{{ modeChips }}\" as=\"c\" hint-placeholder-count=\"3\"><button onclick=\"{{ c.onSelect }}\" style=\"{{ c.style }}\"><span style=\"font-family:'Caveat',cursive;font-size:23px;font-weight:700;line-height:1;\">{{ c.short }}<\/span><span style=\"font-size:11px;opacity:.8;font-weight:700;margin-top:2px;\">{{ c.sub }}<\/span><\/button><\/sc-for><\/div>\n          <\/div><button onclick=\"{{ startPrompts }}\" style=\"width:100%;background:#F27A5B;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #2E2620;\">Start writing<\/button>\n          \n        <\/div>\n        <\/sc-if>\n\n        <!-- JOURNAL PROMPT -->\n        <sc-if value=\"{{ isJprompt }}\">\n        <div class=\"aj-slide\" style=\"min-height:812px;display:flex;flex-direction:column;padding:60px 22px 26px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;\">\n            <button onclick=\"{{ step.back }}\" style=\"display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:#9a8f79;font-size:14px;font-weight:800;\">{{ backIcon }} Back<\/button>\n            <div style=\"display:flex;gap:6px;\"><sc-for list=\"{{ step.dots }}\" as=\"dt\" hint-placeholder-count=\"3\"><span style=\"width:9px;height:9px;border-radius:50%;border:2px solid #2E2620;background:{{ dt.bg }};\"><\/span><\/sc-for><\/div>\n          <\/div>\n          <div style=\"flex:1;display:flex;flex-direction:column;\">\n e }}\">{{ step.micIconSm }} {{ step.recordLabel }}<\/button><\/div><\/div>\n                <sc-if value=\"{{ step.recording }}\"><p style=\"color:#d9634a;font-size:13px;font-weight:800;margin:9px 0 0;\">\u25cf Recording\u2026 {{ step.recordTimer }}<\/p><\/sc-if>\n                <sc-for list=\"{{ step.clips }}\" as=\"cl\" hint-placeholder-count=\"0\">\n                  <div style=\"margin-top:10px;background:#FBF3E1;border:2px solid #EAD9B6;border-radius:12px;padding:8px 10px;\">\n                    <div style=\"display:flex;align-items:center;gap:8px;\"><sc-if value=\"{{ cl.hasSrc }}\"><audio controls=\"controls\" preload=\"metadata\" src=\"{{ cl.src }}\" style=\"height:32px;flex:1;min-width:0;\"><\/audio><\/sc-if><sc-if value=\"{{ cl.noSrc }}\"><span style=\"flex:1;height:6px;border-radius:99px;background:linear-gradient(90deg,#F27A5B,#F2B33D);\"><\/span><\/sc-if><span style=\"font-size:12px;color:#6E6455;font-weight:700;\">{{ cl.dur }}<\/span><button onclick=\"{{ cl.onDel }}\" style=\"background:none;border:none;cursor:pointer;color:#b3a888;font-size:18px;line-height:1;\">\u00d7<\/button><\/div>\n                    <button onclick=\"{{ cl.onSaveTx }}\" style=\"margin-top:8px;width:100%;background:#EEF4EA;border:2px solid #2E2620;border-radius:10px;padding:7px;font-size:12.5px;font-weight:800;cursor:pointer;color:#3f5738;\">Turn recording into text<\/button>\n                  <\/div>\n                <\/sc-for>\n              <\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ step.hasDoodle }}\"><div style=\"margin-top:12px;display:flex;align-items:flex-end;gap:10px;\">{{ step.doodleEl }}<button onclick=\"{{ step.openDoodle }}\" style=\"background:#FFFCF5;border:2px solid #2E2620;border-radius:99px;padding:6px 14px;font-size:12.5px;font-weight:800;cursor:pointer;box-shadow:2px 2px 0 #2E2620;\">Edit<\/button><\/div><\/sc-if>\n          <\/div>\n          <button onclick=\"{{ step.next }}\" style=\"margin-top:16px;width:100%;background:#F27A5B;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #2E2620;\">{{ step.nextLabel }}<\/button>\n        <\/div>\n        <\/sc-if>\n\n        <!-- JOURNAL RATE -->\n        <sc-if value=\"{{ isJrate }}\">\n        <div class=\"aj-slide\" style=\"min-height:812px;display:flex;flex-direction:column;padding:66px 22px 30px;\">\n          <button onclick=\"{{ rateBack }}\" style=\"align-self:flex-start;display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:#9a8f79;font-size:14px;font-weight:800;\">{{ backIcon }} Back<\/button>\n          <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;margin-bottom:14px;\">{{ faceRate }}<h1 style=\"font-family:'Caveat',cursive;font-weight:700;font-size:36px;line-height:1;margin:10px 0 2px;\">Before you close<\/h1><p style=\"color:#6E6455;font-size:14px;margin:0;font-weight:600;\">A few quick taps.<\/p><\/div><div style=\"background:#FFFCF5;border:2.5px solid #2E2620;border-radius:22px;padding:22px 18px;box-shadow:4px 4px 0 #E9D4A6;\">\n              <sc-for list=\"{{ postDials }}\" as=\"d\" hint-placeholder-count=\"3\"><div style=\"margin-top:4px;margin-bottom:20px;\"><div style=\"display:flex;justify-content:space-between;align-items:baseline;\"><span style=\"font-size:14.5px;font-weight:700;\">{{ d.label }}<input type=\"range\" class=\"aj-range\" min=\"1\" max=\"5\" value=\"{{ d.value }}\" oninput=\"{{ d.onInput }}\" style=\"width:100%;margin-top:10px;\"><\/span><span style=\"font-size:15px;color:#F27A5B;font-weight:800;\">{{ d.value }}<\/span><\/div><\/div><\/sc-for>\n            <\/div>\n            \n          <\/div>\n          <button onclick=\"{{ saveEntry }}\" style=\"width:100%;background:#F27A5B;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #2E2620;\">Save entry<\/button>\n        <\/div>\n        <\/sc-if>\n\n        <!-- CLOSING -->\n        <sc-if value=\"{{ isClosing }}\">\n        <div style=\"min-height:812px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 34px;text-align:center;position:relative;overflow:hidden;\">\n          <div style=\"position:absolute;inset:0;pointer-events:none;\"><sc-for list=\"{{ confetti }}\" as=\"f\" hint-placeholder-count=\"0\"><div style=\"{{ f.style }}\"><sc-if value=\"{{ f.isStar }}\"><svg viewBox=\"0 0 24 24\" width=\"{{ f.size }}\" fill=\"none\" stroke=\"{{ f.color }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2l2.4 6.5L21 9l-5 4.2L17.5 21 12 16.8 6.5 21 8 13.2 3 9l6.6-.5z\"><\/path><\/svg><\/sc-if><sc-if value=\"{{ f.isHeart }}\"><svg viewBox=\"0 0 24 24\" width=\"{{ f.size }}\" fill=\"none\" stroke=\"{{ f.color }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 21C4 14 4 7.5 8.4 6.4 11 5.7 12 8.2 12 8.2s1-2.5 3.6-1.8C20 7.5 20 14 12 21z\"><\/path><\/svg><\/sc-if><sc-if value=\"{{ f.isSpark }}\"><svg viewBox=\"0 0 24 24\" width=\"{{ f.size }}\" fill=\"none\" stroke=\"{{ f.color }}\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 3v18M3 12h18\"><\/path><\/svg><\/sc-if><\/div><\/sc-for><\/div>\n          <div style=\"position:relative;animation:aj-popspring .7s cubic-bezier(.2,1.4,.5,1) both;margin-bottom:26px;\">{{ faceClose }}<\/div>\n          <p class=\"aj-rise\" style=\"position:relative;font-family:'Caveat',cursive;font-size:42px;line-height:1;margin:0 0 12px;animation-delay:.5s;\">Nice work today.<\/p>\n          <p class=\"aj-rise\" style=\"position:relative;color:#6E6455;font-size:16px;line-height:1.6;margin:0 0 36px;font-weight:600;animation-delay:.7s;max-width:280px;\">Your thoughts are safely tucked away on this device. Go enjoy your own time.<\/p>\n          <button class=\"aj-pop\" onclick=\"{{ goHistory }}\" style=\"animation-delay:.9s;background:#2E2620;color:#FFFCF5;border:2.5px solid #2E2620;border-radius:16px;padding:15px 40px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:4px 4px 0 #F2B33D;\">See my journal<\/button>\n        <\/div>\n        <\/sc-if>\n\n        <!-- HISTORY -->\n        <sc-if value=\"{{ isHistory }}\">\n        <div class=\"aj-rise\" style=\"padding:66px 20px 100px;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;\"><h1 style=\"font-family:'Caveat',cursive;font-weight:700;font-size:42px;margin:0;line-height:1;\">My journal<\/h1><div style=\"display:flex;gap:6px;\"><button onclick=\"{{ showCal }}\" title=\"Calendar\" style=\"{{ calTabStyle }}\">{{ calIcon }}<\/button><button onclick=\"{{ showList }}\" title=\"List\" style=\"{{ listTabStyle }}\">{{ listIcon }}<\/button><\/div><\/div>\n          <p style=\"color:#6E6455;font-size:14px;margin:4px 0 18px;font-weight:600;\">{{ historyCount }}<\/p>\n          <sc-if value=\"{{ noEntries }}\"><div style=\"background:#FFFCF5;border:2.5px solid #2E2620;border-radius:22px;padding:38px 24px;text-align:center;box-shadow:5px 5px 0 #E9D4A6;\"><div style=\"transform:rotate(-4deg);display:inline-block;margin-bottom:12px;\">{{ faceEmpty }}<\/div><p style=\"color:#6E6455;font-size:15px;margin:0;font-weight:600;\">No entries yet. Your first reflection will appear here.<\/p><\/div><\/sc-if>\n          <sc-if value=\"{{ calView }}\">\n          <div style=\"background:#FFFCF5;border:2.5px solid #2E2620;border-radius:22px;padding:16px 14px;box-shadow:5px 5px 0 #E9D4A6;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\"><button onclick=\"{{ prevMonth }}\" style=\"background:#FBF3E1;border:2px solid #2E2620;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;\">{{ prevIcon }}<\/button><span style=\"font-family:'Caveat',cursive;font-weight:700;font-size:26px;\">{{ monthLabel }}<\/span><button onclick=\"{{ nextMonth }}\" style=\"background:#FBF3E1;border:2px solid #2E2620;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;\">{{ nextIcon }}<\/button><\/div>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;\"><sc-for list=\"{{ weekdays }}\" as=\"w\" hint-placeholder-count=\"7\"><span style=\"text-align:center;font-size:10px;font-weight:800;color:#b3a888;\">{{ w }}<\/span><\/sc-for><\/div>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;\"><sc-for list=\"{{ calCells }}\" as=\"c\" hint-placeholder-count=\"35\"><div style=\"{{ c.wrapStyle }}\" onclick=\"{{ c.onClick }}\"><sc-if value=\"{{ c.isStd }}\">{{ c.faceEl }}<\/sc-if><sc-if value=\"{{ c.isCustom }}\">{{ c.tile }}<\/sc-if><span style=\"{{ c.numStyle }}\">{{ c.day }}<\/span><\/div><\/sc-for><\/div>\n          <\/div>\n          <sc-if value=\"{{ hasSelDay }}\"><p style=\"font-family:'Caveat',cursive;font-weight:700;font-size:24px;margin:20px 2px 4px;\">{{ selDayLabel }}<\/p><\/sc-if>\n          <\/sc-if>\n          <sc-for list=\"{{ visibleEntries }}\" as=\"e\" hint-placeholder-count=\"0\">\n            <button onclick=\"{{ e.onOpen }}\" style=\"{{ e.cardStyle }}\">\n              <div style=\"flex-shrink:0;transform:rotate(-3deg);\"><sc-if value=\"{{ e.isStd }}\">{{ e.faceEl }}<\/sc-if><sc-if value=\"{{ e.isCustom }}\">{{ e.tile }}<\/sc-if><\/div>\n              <div style=\"flex:1;text-align:left;\"><p style=\"margin:0;font-family:'Caveat',cursive;font-size:24px;font-weight:700;line-height:1;\">{{ e.mood }}<\/p><p style=\"margin:3px 0 0;font-size:12px;color:#9a8f79;font-weight:700;\">{{ e.date }}{{ e.editedTag }}<\/p><\/div>\n              <span style=\"font-size:11px;font-weight:800;padding:5px 10px;border:2px solid #2E2620;border-radius:99px;background:#FBF3E1;white-space:nowrap;\">{{ e.mo
